<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>NASA Space Explorer</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>
<body>
  <div class="container">
    <header class="site-header">
      <img src="img/nasa-worm-logo.png" alt="NASA Logo" class="logo" />
      <div>
        <h1>Space Explorer</h1>
        <p class="subtitle">Browse NASA APOD entries across a date range</p>
      </div>
    </header>

    <div class="filters">
      <input type="date" id="startDate" />
      <input type="date" id="endDate" />
      <button id="fetchBtn" type="button">Get Space Images</button>
    </div>

    <section class="fact-panel" aria-live="polite">
      <div>
        <h2>Random Space Fact</h2>
        <p id="spaceFact">Choose a date range to get a fresh APOD gallery and a random space fact.</p>
      </div>
      <button id="newFactBtn" type="button" class="secondary-btn">New Fact</button>
    </section>

    <div id="gallery" class="gallery">
      <div class="placeholder">
        <div class="placeholder-icon">🔭</div>
        <p>Select a date range and click "Get Space Images" to explore the cosmos!</p>
      </div>
    </div>
  </div>

  <div id="loadingOverlay" class="loading-overlay hidden" aria-hidden="true">
    <div class="loading-content">
      <div class="spinner"></div>
      <p>Loading NASA APOD entries...</p>
    </div>
  </div>

  <div id="mediaModal" class="modal hidden" aria-hidden="true" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
    <div class="modal-backdrop" data-close-modal="true"></div>
    <div class="modal-dialog">
      <button id="closeModalBtn" class="modal-close" aria-label="Close modal">&times;</button>
      <div id="modalMedia" class="modal-media"></div>
      <div class="modal-copy">
        <h2 id="modalTitle"></h2>
        <p id="modalDate" class="modal-date"></p>
        <p id="modalExplanation" class="modal-explanation"></p>
      </div>
    </div>
  </div>

  <script src="js/dateRange.js"></script>
  <script src="js/script.js"></script>
</body>
</html>
